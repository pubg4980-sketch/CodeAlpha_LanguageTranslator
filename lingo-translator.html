<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingo — Language Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --ink: #1c1b1a;
    --paper: #faf7f2;
    --panel: #ffffff;
    --line: #e3ddd2;
    --line-strong: #c9c0ae;
    --moss: #4a5d45;
    --moss-soft: #e7ebe2;
    --clay: #b3552f;
    --muted: #8a8275;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 64px;
  }

  .wrap { width: 100%; max-width: 880px; }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 36px;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand span { color: var(--clay); font-style: italic; }

  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: right;
    line-height: 1.6;
  }

  /* Language bar */
  .lang-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 4px;
  }

  .lang-select-wrap { flex: 1; position: relative; }

  select {
    width: 100%;
    appearance: none;
    background: var(--panel);
    border: 1.5px solid var(--line-strong);
    border-radius: 3px;
    padding: 12px 38px 12px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover, select:focus { border-color: var(--ink); outline: none; }

  .lang-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }

  .swap-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--line-strong);
    background: var(--panel);
    color: var(--ink);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .swap-btn:hover { background: var(--ink); color: var(--paper); transform: rotate(180deg); }

  /* Panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line-strong);
    border: 1.5px solid var(--line-strong);
    margin-top: 16px;
  }

  .panel {
    background: var(--panel);
    padding: 22px;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
  }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-family: 'Fraunces', serif;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink);
  }
  textarea::placeholder { color: var(--muted); font-style: italic; }

  .output-text {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 19px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-wrap;
  }
  .output-text.placeholder { color: var(--muted); font-style: italic; }
  .output-text.loading { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .panel-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--line-strong);
    border-radius: 3px;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--ink);
    font-size: 13px;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--moss-soft); border-color: var(--moss); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.copied { background: var(--moss); border-color: var(--moss); color: var(--paper); }

  .icon-row { display: flex; gap: 6px; }

  /* Action row */
  .action-row {
    display: flex;
    justify-content: center;
    margin: 28px 0 0;
  }

  .translate-btn {
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 42px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.18s;
  }
  .translate-btn:hover { background: var(--clay); }
  .translate-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Status strip */
  .status {
    text-align: center;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-height: 16px;
  }
  .status.error { color: var(--clay); }

  /* Footer */
  .footer-note {
    margin-top: 56px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }

  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .tagline { text-align: left; }
  }

  *:focus-visible { outline: 2px solid var(--clay); outline-offset: 2px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">Lin<span>go</span></div>
    <div class="tagline">Language Translation<br/>Tool — CodeAlpha Task 1</div>
  </header>

  <div class="lang-bar">
    <div class="lang-select-wrap">
      <select id="sourceLang" aria-label="Source language"></select>
    </div>
    <button class="swap-btn" id="swapBtn" aria-label="Swap languages" title="Swap languages">⇄</button>
    <div class="lang-select-wrap">
      <select id="targetLang" aria-label="Target language"></select>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-label">
        <span>Source text</span>
        <span id="sourceLangLabel"></span>
      </div>
      <textarea id="sourceText" placeholder="Type or paste text to translate…" maxlength="2000"></textarea>
      <div class="panel-footer">
        <span class="char-count"><span id="charCount">0</span> / 2000</span>
        <div class="icon-row">
          <button class="icon-btn" id="speakSourceBtn" title="Listen" aria-label="Listen to source text">🔊</button>
          <button class="icon-btn" id="clearBtn" title="Clear" aria-label="Clear text">✕</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">
        <span>Translation</span>
        <span id="targetLangLabel"></span>
      </div>
      <div class="output-text placeholder" id="outputText">Translation will appear here…</div>
      <div class="panel-footer">
        <span class="char-count">&nbsp;</span>
        <div class="icon-row">
          <button class="icon-btn" id="speakTargetBtn" title="Listen" aria-label="Listen to translation">🔊</button>
          <button class="icon-btn" id="copyBtn" title="Copy" aria-label="Copy translation">⧉</button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="translate-btn" id="translateBtn">Translate</button>
  </div>
  <div class="status" id="statusMsg"></div>

  <div class="footer-note">
    Auto-translates as you type · Built for CodeAlpha AI Internship — Task 1<br/>
    Uses the public Google Translate endpoint, no API key required
  </div>
</div>

<script>
  // ---- Language list (code, label) ----
  const LANGUAGES = [
    ['auto', 'Detect language'],
    ['en', 'English'], ['es', 'Spanish'], ['fr', 'French'], ['de', 'German'],
    ['it', 'Italian'], ['pt', 'Portuguese'], ['ru', 'Russian'], ['ja', 'Japanese'],
    ['ko', 'Korean'], ['zh-CN', 'Chinese (Simplified)'], ['zh-TW', 'Chinese (Traditional)'],
    ['ar', 'Arabic'], ['hi', 'Hindi'], ['ur', 'Urdu'], ['bn', 'Bengali'],
    ['tr', 'Turkish'], ['nl', 'Dutch'], ['pl', 'Polish'], ['sv', 'Swedish'],
    ['vi', 'Vietnamese'], ['th', 'Thai'], ['id', 'Indonesian'], ['he', 'Hebrew'],
    ['fa', 'Persian'], ['pa', 'Punjabi'], ['ta', 'Tamil'], ['te', 'Telugu'],
    ['ms', 'Malay'], ['el', 'Greek'], ['uk', 'Ukrainian'], ['ro', 'Romanian'],
    ['cs', 'Czech'], ['hu', 'Hungarian'], ['fi', 'Finnish'], ['no', 'Norwegian'],
    ['da', 'Danish'], ['sw', 'Swahili'], ['fil', 'Filipino']
  ];

  const sourceSel = document.getElementById('sourceLang');
  const targetSel = document.getElementById('targetLang');
  const sourceText = document.getElementById('sourceText');
  const outputText = document.getElementById('outputText');
  const translateBtn = document.getElementById('translateBtn');
  const statusMsg = document.getElementById('statusMsg');
  const charCount = document.getElementById('charCount');
  const sourceLangLabel = document.getElementById('sourceLangLabel');
  const targetLangLabel = document.getElementById('targetLangLabel');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const swapBtn = document.getElementById('swapBtn');
  const speakSourceBtn = document.getElementById('speakSourceBtn');
  const speakTargetBtn = document.getElementById('speakTargetBtn');

  function populateSelect(sel, includeAuto) {
    LANGUAGES.forEach(([code, name]) => {
      if (code === 'auto' && !includeAuto) return;
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = name;
      sel.appendChild(opt);
    });
  }
  populateSelect(sourceSel, true);
  populateSelect(targetSel, false);
  sourceSel.value = 'auto';
  targetSel.value = 'es';

  function langName(code) {
    const found = LANGUAGES.find(l => l[0] === code);
    return found ? found[1] : code;
  }

  function updateLabels() {
    sourceLangLabel.textContent = langName(sourceSel.value);
    targetLangLabel.textContent = langName(targetSel.value);
  }
  updateLabels();
  sourceSel.addEventListener('change', updateLabels);
  targetSel.addEventListener('change', updateLabels);

  sourceText.addEventListener('input', () => {
    charCount.textContent = sourceText.value.length;
  });

  // ---- Swap languages ----
  swapBtn.addEventListener('click', () => {
    if (sourceSel.value === 'auto') {
      statusMsg.textContent = "Can't swap while source is set to auto-detect";
      statusMsg.classList.add('error');
      setTimeout(() => { statusMsg.textContent = ''; statusMsg.classList.remove('error'); }, 2000);
      return;
    }
    const s = sourceSel.value, t = targetSel.value;
    sourceSel.value = t;
    targetSel.value = s;
    updateLabels();
    const currentOutput = outputText.textContent;
    if (!outputText.classList.contains('placeholder') && !outputText.classList.contains('loading')) {
      sourceText.value = currentOutput;
      charCount.textContent = sourceText.value.length;
      doTranslate();
    }
  });

  // ---- Clear ----
  clearBtn.addEventListener('click', () => {
    sourceText.value = '';
    charCount.textContent = '0';
    resetOutput();
    sourceText.focus();
  });

  function resetOutput() {
    outputText.textContent = 'Translation will appear here…';
    outputText.classList.add('placeholder');
    outputText.classList.remove('loading');
  }

  // ---- Copy ----
  copyBtn.addEventListener('click', () => {
    if (outputText.classList.contains('placeholder') || outputText.classList.contains('loading')) return;
    navigator.clipboard.writeText(outputText.textContent).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.textContent = '⧉'; }, 1200);
    });
  });

  // ---- Text to speech ----
  function speak(text, lang) {
    if (!text || !window.speechSynthesis) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang === 'auto' ? 'en' : lang;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }
  speakSourceBtn.addEventListener('click', () => speak(sourceText.value, sourceSel.value));
  speakTargetBtn.addEventListener('click', () => {
    if (!outputText.classList.contains('placeholder') && !outputText.classList.contains('loading')) {
      speak(outputText.textContent, targetSel.value);
    }
  });

  // ---- Translation logic ----
  let debounceTimer = null;
  sourceText.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    if (!sourceText.value.trim()) { resetOutput(); return; }
    debounceTimer = setTimeout(doTranslate, 700);
  });
  sourceSel.addEventListener('change', () => { if (sourceText.value.trim()) doTranslate(); });
  targetSel.addEventListener('change', () => { if (sourceText.value.trim()) doTranslate(); });
  translateBtn.addEventListener('click', doTranslate);

  async function doTranslate() {
    const text = sourceText.value.trim();
    if (!text) {
      statusMsg.textContent = 'Type something to translate first.';
      statusMsg.classList.add('error');
      setTimeout(() => { statusMsg.textContent = ''; statusMsg.classList.remove('error'); }, 1800);
      return;
    }

    outputText.textContent = 'Translating…';
    outputText.classList.remove('placeholder');
    outputText.classList.add('loading');
    statusMsg.textContent = '';
    statusMsg.classList.remove('error');
    translateBtn.disabled = true;

    const sl = sourceSel.value;
    const tl = targetSel.value;

    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Network response was not ok (' + res.status + ')');
      const data = await res.json();

      const translated = data[0].map(seg => seg[0]).join('');
      const detectedLang = data[2];

      outputText.textContent = translated;
      outputText.classList.remove('loading', 'placeholder');

      if (sl === 'auto' && detectedLang) {
        statusMsg.textContent = `Detected source language: ${langName(detectedLang)}`;
      } else {
        statusMsg.textContent = 'Translated successfully.';
      }
    } catch (err) {
      outputText.textContent = 'Translation will appear here…';
      outputText.classList.add('placeholder');
      outputText.classList.remove('loading');
      statusMsg.textContent = 'Translation failed — check your connection and try again.';
      statusMsg.classList.add('error');
      console.error(err);
    } finally {
      translateBtn.disabled = false;
    }
  }
</script>
</body>
</html>
